<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apology 💔</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SCREEN 1 -->
<div class="screen active" id="screen1">
    <div class="card">
        <img src="my-photo.jpeg">
        <h1>Hey... 🥺</h1>

        <div class="main-text">Mujhe pata hai tum naraz ho... 😭</div>
        <div class="sub-text">Please meri baat sun lo... 🥺</div>

        <br>
        <button class="accept" onclick="showScreen(1)">Theek hai, bolo...</button>
        <button class="reject">Nahi, abhi gussa hoon</button>
    </div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen2">
    <div class="box">
        <div class="title">Dil Se Sorry... 💕</div>

        <p class="text">Meri jaan...</p>
        <p class="text">Mujhe pata hai maine tumhe hurt kiya...</p>
        <p class="text">Tum mere liye bahut special ho...</p>
        <p class="text">Main promise karta hoon better rahunga...</p>

        <button class="next-btn" onclick="showScreen(2)">Aur bhi kuch hai 💕</button>
    </div>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="screen3">
    <div class="header3">
        <div class="title3">Hamari Yaadein ☁️</div>
    </div>

    <div class="grid">
        <div class="memory-card"><img src="img1.jpeg"></div>
        <div class="memory-card"><img src="img2.jpeg"></div>
        <div class="memory-card"><img src="img3.jpeg"></div>
        <div class="memory-card"><img src="img4.jpeg"></div>
        <div class="memory-card"><img src="img5.jpeg"></div>
        <div class="memory-card"><img src="img6.jpeg"></div>
        <div class="memory-card"><img src="img7.jpeg"></div>
        <div class="memory-card"><img src="img8.jpeg"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
